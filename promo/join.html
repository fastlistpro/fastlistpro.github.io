<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastListPro Promo Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4">
    <div class="max-w-xl w-full bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700">
        <h1 class="text-2xl font-bold text-blue-400 mb-6 text-center">Member Promo Tools</h1>
        
        <div class="mb-6">
            <label class="block text-sm text-gray-400 mb-2">Your Referral Link</label>
            <div class="flex gap-2">
                <input type="text" id="refLink" readonly class="w-full bg-gray-950 border border-gray-600 rounded p-2 text-blue-300 font-mono">
                <button onclick="copyToClipboard('refLink')" class="bg-blue-600 px-4 py-2 rounded font-bold hover:bg-blue-500 transition">COPY</button>
            </div>
        </div>

        <div class="space-y-4">
            <h2 class="text-lg font-semibold text-gray-300 border-b border-gray-700 pb-2">Email Swipe</h2>
            <div class="relative">
                <textarea id="emailSwipe" readonly class="w-full bg-gray-950 border border-gray-600 rounded p-4 h-32 text-sm text-gray-300 focus:outline-none"></textarea>
                <button onclick="copyToClipboard('emailSwipe')" class="absolute top-2 right-2 bg-gray-700 hover:bg-gray-600 px-2 py-1 rounded text-xs text-gray-400">Copy Text</button>
            </div>
        </div>
    </div>

    <script>
        // Extract RID from URL (e.g., ?rid=123)
        const params = new URLSearchParams(window.location.search);
        const rid = params.get('rid') || 'default';
        const memberLink = `https://fastlistpro.com/join.php?rid=${rid}`;
        
        // Update the page elements
        document.getElementById('refLink').value = memberLink;
        document.getElementById('emailSwipe').value = `Subject: Quick question...\n\nHave you seen FastListPro yet? It's the best way to scale your list.\n\nCheck it out here: ${memberLink}`;

        function copyToClipboard(id) {
            const copyText = document.getElementById(id);
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            alert("Copied to clipboard!");
        }
    </script>
</body>
</html>
